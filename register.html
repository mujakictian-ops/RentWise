<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RentWise — Start Free Trial</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0C0C0F; --card: #141417; --card2: #1A1A1E;
      --gold: #C9A84C; --gold-light: #E2C97A; --gold-dim: rgba(201,168,76,0.1);
      --gold-border: rgba(201,168,76,0.2); --white: #FFFFFF;
      --gray: #666B78; --gray-light: #9BA3B2; --border: rgba(255,255,255,0.07);
      --red: #E05252; --green: #3ECF8E;
    }
    body { font-family: 'Inter', sans-serif; background: var(--black); color: var(--white); min-height: 100vh; display: flex; flex-direction: column; }

    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 64px; border-bottom: 1px solid var(--border);
    }
    .logo { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 1.1rem; text-decoration: none; color: var(--white); }
    .logo-icon { width: 28px; height: 28px; background: linear-gradient(135deg, var(--gold), var(--gold-light)); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .logo span { color: var(--gold); }
    .nav-login { font-size: 0.85rem; color: var(--gray-light); text-decoration: none; }
    .nav-login:hover { color: var(--white); }

    main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 48px 24px;
    }

    .box {
      width: 100%; max-width: 440px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 40px 36px;
    }

    .box-head { text-align: center; margin-bottom: 28px; }
    .box-head h1 { font-size: 1.55rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 8px; }
    .box-head p { font-size: 0.85rem; color: var(--gray-light); line-height: 1.65; }

    /* Plan toggle */
    .plan-toggle {
      display: flex; background: var(--card2); border: 1px solid var(--border);
      border-radius: 10px; padding: 4px; margin-bottom: 28px; gap: 4px;
    }
    .plan-btn {
      flex: 1; padding: 10px 8px; border-radius: 7px; border: none; cursor: pointer;
      font-family: 'Inter', sans-serif; font-size: 0.82rem; font-weight: 600;
      color: var(--gray-light); background: transparent; transition: all 0.2s;
      text-align: center; line-height: 1.3;
    }
    .plan-btn.active {
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: #0C0C0F;
    }
    .plan-btn span { display: block; font-size: 0.7rem; font-weight: 500; opacity: 0.75; }

    /* Form */
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--gray-light); margin-bottom: 6px; letter-spacing: 0.03em; }
    input, select {
      width: 100%; padding: 11px 14px; border-radius: 9px;
      background: var(--card2); border: 1px solid var(--border);
      color: var(--white); font-family: 'Inter', sans-serif; font-size: 0.9rem;
      outline: none; transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: var(--gold-border); }
    input::placeholder { color: var(--gray); }
    select option { background: var(--card2); }

    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .btn-submit {
      width: 100%; padding: 13px; border-radius: 10px; border: none;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: #0C0C0F; font-family: 'Inter', sans-serif; font-size: 1rem;
      font-weight: 800; cursor: pointer; margin-top: 8px; transition: opacity 0.2s, transform 0.2s;
    }
    .btn-submit:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .trial-note {
      display: flex; align-items: center; gap: 8px; margin-top: 14px;
      background: var(--gold-dim); border: 1px solid var(--gold-border);
      border-radius: 8px; padding: 10px 14px; font-size: 0.78rem; color: #D4C08A;
    }

    .divider { height: 1px; background: var(--border); margin: 20px 0; }

    .login-link { text-align: center; font-size: 0.82rem; color: var(--gray); }
    .login-link a { color: var(--gold); text-decoration: none; font-weight: 600; }

    .error-msg {
      background: rgba(224,82,82,0.1); border: 1px solid rgba(224,82,82,0.25);
      color: var(--red); border-radius: 8px; padding: 10px 14px;
      font-size: 0.82rem; margin-bottom: 16px; display: none;
    }

    footer { text-align: center; padding: 20px; font-size: 0.72rem; color: var(--gray); border-top: 1px solid var(--border); }
  </style>
</head>
<body>

<nav>
  <a href="/" class="logo">
    <div class="logo-icon">🏠</div>
    Rent<span>Wise</span>
  </a>
  <a href="/rentwise-login.html" class="nav-login">Already have an account? Log in →</a>
</nav>

<main>
  <div class="box">
    <div class="box-head">
      <h1>Start your free trial</h1>
      <p>14 days free. Know exactly what you owe the IRS — every quarter.</p>
    </div>

    <!-- Plan toggle -->
    <div class="plan-toggle">
      <button class="plan-btn" id="btn-monthly" onclick="selectPlan('monthly')">
        Monthly
        <span>$79/month</span>
      </button>
      <button class="plan-btn active" id="btn-annual" onclick="selectPlan('annual')">
        Annual — Save 25%
        <span>$59/month · $708/year</span>
      </button>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <form id="register-form" onsubmit="handleRegister(event)">
      <div class="field-row">
        <div class="field">
          <label>First name</label>
          <input type="text" id="first-name" placeholder="John" required />
        </div>
        <div class="field">
          <label>Last name</label>
          <input type="text" id="last-name" placeholder="Smith" required />
        </div>
      </div>

      <div class="field">
        <label>Email address</label>
        <input type="email" id="email" placeholder="john@email.com" required />
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="At least 8 characters" minlength="8" required />
      </div>

      <div class="field">
        <label>Filing status</label>
        <select id="filing-status">
          <option value="single">Single</option>
          <option value="married_joint">Married Filing Jointly</option>
          <option value="married_separate">Married Filing Separately</option>
          <option value="head">Head of Household</option>
        </select>
      </div>

      <div class="field">
        <label>Other annual income (salary, etc.) — optional</label>
        <input type="number" id="other-income" placeholder="e.g. 85000" min="0" />
      </div>

      <button type="submit" class="btn-submit" id="submit-btn">
        Start 14-day free trial →
      </button>
    </form>

    <div class="trial-note">
      💳 Credit card collected via Stripe at next step. Cancel anytime.
    </div>

    <div class="divider"></div>
    <div class="login-link">Already have an account? <a href="/rentwise-login.html">Log in</a></div>
  </div>
</main>

<footer>RentWise is a tax estimation tool — not tax advice. © 2026 RentWise</footer>

<script>
  // CONFIG — zamenjaj s svojimi ključi
  const SUPABASE_URL = 'https://lkgxfzefpmrgwqwboqbf.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxrZ3hmemVmcG1yZ3dxd2JvcWJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MDg4NzAsImV4cCI6MjA5OTE4NDg3MH0.mDYfFKDFTtoRnETBv9_sbMiOhzw_YayW9Cf_Q5iw2Pw';
  const STRIPE_MONTHLY_PRICE = 'price_TEST_MONTHLY';
  const STRIPE_ANNUAL_PRICE = 'price_TEST_ANNUAL';

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let selectedPlan = 'annual';

  function selectPlan(plan) {
    selectedPlan = plan;
    document.getElementById('btn-monthly').classList.toggle('active', plan === 'monthly');
    document.getElementById('btn-annual').classList.toggle('active', plan === 'annual');
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  async function handleRegister(e) {
    e.preventDefault();
    document.getElementById('error-msg').style.display = 'none';

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Creating account…';

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const firstName = document.getElementById('first-name').value.trim();
    const lastName = document.getElementById('last-name').value.trim();
    const filingStatus = document.getElementById('filing-status').value;
    const otherIncome = parseFloat(document.getElementById('other-income').value) || 0;

    try {
      // 1. Ustvari Supabase račun
      const { data: authData, error: authError } = await supabase.auth.signUp({
        email, password,
        options: { data: { full_name: `${firstName} ${lastName}` } }
      });

      if (authError) throw authError;

      // 2. Posodobi profil
      if (authData.user) {
        await supabase.from('profiles').update({
          full_name: `${firstName} ${lastName}`,
          filing_status: filingStatus,
          other_income: otherIncome,
        }).eq('id', authData.user.id);
      }

      // 3. Stripe Checkout
      const priceId = selectedPlan === 'annual' ? STRIPE_ANNUAL_PRICE : STRIPE_MONTHLY_PRICE;
      const res = await fetch('/api/create-checkout-session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          priceId,
          userEmail: email,
          userId: authData.user?.id,
        }),
      });

      const { url, error } = await res.json();
      if (error) throw new Error(error);
      if (url) window.location.href = url;

    } catch (err) {
      showError(err.message || 'Something went wrong. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Start 14-day free trial →';
    }
  }
</script>

</body>
</html>
